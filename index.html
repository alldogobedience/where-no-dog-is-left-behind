<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Dog Obedience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-orange-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function AllDogObedienceApp() {
            const [view, setView] = useState('admin'); 
            const [commands, setCommands] = useState([
                { id: 1, name: 'Place', characteristics: 'Must stay until released. Use the raised cot for boundaries.' },
                { id: 2, name: 'Recall', characteristics: 'High-pitch verbal cue; reward immediately upon return.' }
            ]);
            const [newCommand, setNewCommand] = useState({ name: '', characteristics: '' });

            const addCommand = () => {
                if (newCommand.name) {
                    setCommands([...commands, { ...newCommand, id: Date.now() }]);
                    setNewCommand({ name: '', characteristics: '' });
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="mb-10 text-center flex flex-col items-center">
                        <div className="w-24 h-24 mb-4 flex items-center justify-center bg-white rounded-full shadow-lg border-2 border-orange-200">
                           <span className="text-3xl text-orange-500 font-black">ADO</span>
                        </div>
                        <h1 className="text-3xl font-black text-orange-600 uppercase tracking-tight">All Dog Obedience</h1>
                        <p className="text-lg italic font-medium text-gray-700">"Where no dog is left behind"</p>
                        <p className="mt-2 font-bold text-gray-500">812-483-1632</p>
                        
                        <div className="mt-6 flex gap-3">
                            <button 
                                onClick={() => setView('admin')} 
                                className={`px-6 py-2 rounded-full font-bold transition-all ${view === 'admin' ? 'bg-orange-500 text-white shadow-md' : 'bg-white text-orange-500 border border-orange-500'}`}
                            >
                                Trainer
                            </button>
                            <button 
                                onClick={() => setView('client')} 
                                className={`px-6 py-2 rounded-full font-bold transition-all ${view === 'client' ? 'bg-orange-500 text-white shadow-md' : 'bg-white text-orange-500 border border-orange-500'}`}
                            >
                                Client
                            </button>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-orange-100">
                        {view === 'admin' ? (
                            <div className="p-6 bg-orange-50/30">
                                <h2 className="text-xl font-bold mb-4 text-orange-800 tracking-tight">Add Key Characteristics</h2>
                                <div className="space-y-3">
                                    <input 
                                        className="w-full p-3 border border-orange-200 rounded-xl focus:ring-2 focus:ring-orange-300 outline-none"
                                        placeholder="Command Name"
                                        value={newCommand.name}
                                        onChange={(e) => setNewCommand({...newCommand, name: e.target.value})}
                                    />
                                    <textarea 
                                        className="w-full p-3 border border-orange-200 rounded-xl focus:ring-2 focus:ring-orange-300 outline-none"
                                        placeholder="Special instructions or characteristics..."
                                        rows="3"
                                        value={newCommand.characteristics}
                                        onChange={(e) => setNewCommand({...newCommand, characteristics: e.target.value})}
                                    />
                                    <button 
                                        onClick={addCommand}
                                        className="w-full bg-orange-500 text-white font-bold py-3 rounded-xl hover:bg-orange-600 transition"
                                    >
                                        Save to List
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="p-6">
                                <h2 className="text-xl font-bold text-gray-800">Your Dog's Training</h2>
                                <p className="text-sm text-gray-500 mb-4 font-medium">Updated by Jennifer Schmett</p>
                            </div>
                        )}

                        <div className="p-6">
                            <h3 className="text-lg font-bold mb-4 flex items-center gap-2">
                                <div className="w-1.5 h-5 bg-orange-500 rounded-full"></div>
                                Active Skills
                            </h3>
                            <div className="space-y-4">
                                {commands.map((cmd) => (
                                    <div key={cmd.id} className="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                                        <h4 className="font-black text-orange-600 uppercase text-sm tracking-wider">{cmd.name}</h4>
                                        <p className="mt-1 text-gray-700 text-sm leading-relaxed italic border-l-2 border-orange-200 pl-3">
                                            {cmd.characteristics}
                                        </p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AllDogObedienceApp />);
    </script>
</body>
</html>
