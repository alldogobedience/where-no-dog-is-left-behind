<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Dog Obedience | Training Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Inter:wght@800;900&display=swap');
        
        body { font-family: 'Quicksand', sans-serif; background-color: #f0f9ff; color: #1e293b; margin: 0; }
        
        @media print {
            nav, .no-print, button, .delete-btn { display: none !important; }
            body { background: white !important; }
            .dog-card { border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; width: 100% !important; }
        }

        .btn-oval { 
            background-color: #1e3a8a !important; 
            color: #ffffff !important; 
            padding: 10px 20px !important;
            border-radius: 50px !important;
            font-size: 10px !important;
            font-weight: 800 !important;
            text-transform: uppercase !important;
            letter-spacing: 0.1em !important;
            transition: all 0.2s;
        }

        .coin-frame {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border: 2px solid #e0f2fe;
        }
        .coin-img { width: 90%; height: 90%; object-fit: contain; }

        .dog-card {
            background: white;
            border-radius: 35px;
            padding: 25px;
            border: 3px solid #e0f2fe;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
        }

        .command-row { border-bottom: 1px solid #f1f5f9; padding: 12px 0; }
        .section-hidden { display: none; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="p-6 flex justify-center gap-2 no-print">
        <button onclick="showSection('public')" class="btn-oval">Home</button>
        <button onclick="checkPassword('client')" class="btn-oval">Clients</button>
        <button onclick="checkPassword('trainer')" class="btn-oval">Trainer</button>
    </nav>

    <main class="max-w-md mx-auto px-6">
        
        <section id="public-section" class="text-center pt-4">
            <div class="coin-frame"><img src="Logo.PNG" class="coin-img" alt="Logo"></div>
            <div class="dog-card text-left mb-6">
                <h3 class="text-xl font-bold mb-2">Ask the Trainer</h3>
                <p class="text-sm text-slate-500 mb-6">Direct line for expert advice.</p>
                <a href="sms:+18124831632" class="block w-full text-center py-4 bg-slate-900 text-white rounded-2xl font-bold uppercase tracking-widest text-xs">Send Message</a>
            </div>
        </section>

        <section id="portal-section" class="section-hidden pt-4 text-center">
            <h2 class="text-3xl font-black mb-6">Current Students</h2>
            <div id="dog-list-container" class="space-y-4"></div>
        </section>

        <section id="dog-detail-section" class="section-hidden pt-4">
            <div class="flex justify-between items-center mb-6 no-print">
                <button onclick="showSection('portal')" class="text-blue-600 font-bold text-sm">← Back</button>
                <button onclick="window.print()" class="bg-slate-100 px-4 py-2 rounded-xl text-xs font-bold uppercase">Print Report</button>
            </div>
            <div id="detail-content"></div>
        </section>

        <section id="admin-section" class="section-hidden pt-4">
            <div class="bg-slate-900 text-white p-8 rounded-[40px] shadow-2xl">
                <h2 class="text-center font-black uppercase text-xs tracking-widest mb-8 text-blue-400">Trainer Control</h2>
                
                <div class="space-y-4">
                    <input id="in-name" type="text" placeholder="Dog's Name" class="w-full p-4 rounded-2xl text-black font-bold outline-none">
                    
                    <div id="admin-commands-list" class="space-y-3">
                        <div class="command-entry flex flex-col gap-2 p-4 bg-slate-800 rounded-2xl">
                            <input type="text" placeholder="Command (e.g. Sit)" class="cmd-name bg-transparent border-b border-slate-700 outline-none text-white font-bold">
                            <input type="text" placeholder="Note (e.g. Holding for 30s)" class="cmd-note bg-transparent outline-none text-slate-400 text-sm">
                        </div>
                    </div>

                    <button onclick="addCommandInput()" class="w-full border-2 border-dashed border-slate-700 py-3 rounded-2xl text-[10px] font-bold uppercase">+ Add Command</button>
                    
                    <textarea id="in-general-notes" class="w-full p-4 rounded-2xl text-black text-sm h-24 outline-none" placeholder="General Progress Notes"></textarea>
                    
                    <button id="save-btn" onclick="saveDogData()" class="w-full bg-blue-500 text-white font-black py-5 rounded-2xl text-xs uppercase tracking-widest">Save to Cloud</button>
                </div>

                <div id="manage-dogs" class="mt-10 pt-6 border-t border-slate-800">
                    <label class="text-[10px] uppercase font-bold opacity-50 block mb-4">Current Kennel (Cloud)</label>
                    <div id="admin-dog-list" class="space-y-2 text-sm"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- CONFIGURATION ---
        const _URL = "https://yljpxwftoiofpvblcdlx.supabase.co";
        const _KEY = "Sb_publishable_g7HKRXQQRJHAOO1hzp4RKg_7D9xJYnU"; 
        
        const supabase = window.supabase.createClient(_URL, _KEY);

        const CLIENT_PASS = "doggy";
        const TRAINER_PASS = "trainer123";
        let dogs = [];

        async function loadDogs() {
            const { data, error } = await supabase.from('dogs').select('*').order('created_at', { ascending: false });
            if (data) { dogs = data; }
            if (error) console.error("Cloud Error:", error);
        }

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('section-hidden'));
            const target = document.getElementById(id + '-section');
            if(target) target.classList.remove('section-hidden');
            window.scrollTo(0,0);
        }

        async function checkPassword(type) {
            const entry = prompt("Enter Password:");
            await loadDogs(); 
            if (type === 'client' && entry === CLIENT_PASS) { renderDogPortal(); showSection('portal'); }
            else if (type === 'trainer' && entry === TRAINER_PASS) { renderAdminList(); showSection('admin'); }
            else if (entry !== null) { alert("Wrong password"); }
        }

        function addCommandInput() {
            const div = document.createElement('div');
            div.className = "command-entry flex flex-col gap-2 p-4 bg-slate-800 rounded-2xl relative mt-2";
            div.innerHTML = `
                <input type="text" placeholder="Command" class="cmd-name bg-transparent border-b border-slate-700 outline-none text-white font-bold">
                <input type="text" placeholder="Note" class="cmd-note bg-transparent outline-none text-slate-400 text-sm">
                <button onclick="this.parentElement.remove()" class="absolute top-2 right-4 text-red-400 text-xs font-bold">✕</button>
            `;
            document.getElementById('admin-commands-list').appendChild(div);
        }

        async function saveDogData() {
            const name = document.getElementById('in-name').value;
            const notes = document.getElementById('in-general-notes').value;
            const cmdNames = document.querySelectorAll('.cmd-name');
            const cmdNotes = document.querySelectorAll('.cmd-note');
            
            let commandData = [];
            cmdNames.forEach((input, i) => {
                if(input.value) commandData.push({ name: input.value, note: cmdNotes[i].value });
            });

            if(!name) return alert("Please enter the dog's name");
            
            const saveBtn = document.getElementById('save-btn');
            saveBtn.innerText = "SAVING...";
            saveBtn.disabled = true;

            const { error } = await supabase.from('dogs').insert([{ 
                name: name, 
                commands: commandData, 
                notes: notes 
            }]);

            if(error) {
                alert("Cloud Sync Failed. Make sure your table is set up in Supabase!");
                console.error(error);
                saveBtn.innerText = "Save to Cloud";
                saveBtn.disabled = false;
            } else {
                alert("Report Saved successfully!");
                location.reload(); 
            }
        }

        function renderDogPortal() {
            const container = document.getElementById('dog-list-container');
            container.innerHTML = dogs.length ? '' : '<p class="text-slate-400">No students found.</p>'; 
            dogs.forEach(dog => {
                const div = document.createElement('div');
                div.className = "dog-card cursor-pointer text-left";
                div.innerHTML = `
                    <h3 class="text-2xl font-black">${dog.name}</h3>
                    <p class="text-xs font-bold text-blue-600 uppercase tracking-widest mt-2">View Training Report →</p>
                `;
                div.onclick = () => viewDogDetail(dog.id);
                container.appendChild(div);
            });
        }

        function viewDogDetail(id) {
            const dog = dogs.find(d => d.id == id);
            if(!dog) return;

            const content = document.getElementById('detail-content');
            const cmdHtml = dog.commands && dog.commands.length 
                ? dog.commands.map(c => `
                    <div class="command-row">
                        <div class="font-bold text-slate-900">${c.name}</div>
                        <div class="text-sm text-slate-500 italic">${c.note || ''}</div>
                    </div>
                `).join('')
                : '<p class="text-sm text-slate-400 py-4">No commands recorded yet.</p>';

            content.innerHTML = `
                <div class="dog-card">
                    <div class="text-center mb-6">
                        <div class="coin-frame"><img src="Logo.PNG" class="coin-img" alt="Logo"></div>
                        <h2 class="text-4xl font-black uppercase">${dog.name}</h2>
                        <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Training Report</p>
                    </div>
                    <div class="space-y-2 mb-8">${cmdHtml}</div>
                    <div class="bg-blue-50 p-6 rounded-3xl border border-blue-100">
                        <h4 class="text-[10px] font-black uppercase mb-2 text-slate-400">Trainer's Summary</h4>
                        <p class="text-sm text-slate-700 leading-relaxed">${dog.notes || 'Your dog is doing great!'}</p>
                    </div>
                </div>
            `;
            showSection('dog-detail');
        }

        function renderAdminList() {
            const container = document.getElementById('admin-dog-list');
            container.innerHTML = dogs.length 
                ? dogs.map(dog => `
                    <div class="flex justify-between items-center bg-slate-800 p-4 rounded-2xl">
                        <span class="font-bold">${dog.name}</span>
                        <button onclick="deleteDog('${dog.id}')" class="text-red-400 text-[10px] font-bold uppercase bg-red-400/10 px-3 py-1 rounded-lg">Delete</button>
                    </div>
                `).join('')
                : '<p class="text-slate-500 italic">No dogs in database.</p>';
        }

        async function deleteDog(id) {
            if(confirm("Are you sure you want to delete this report forever?")) {
                const { error } = await supabase.from('dogs').delete().eq('id', id);
                if(error) alert("Error deleting dog");
                else location.reload();
            }
        }
    </script>
</body>
</html>
