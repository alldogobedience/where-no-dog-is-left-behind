<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>All Dog Obedience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; background-color: #f0f9ff; margin: 0; -webkit-tap-highlight-color: transparent; }
        
        /* High-priority Button Styling */
        .nav-container { position: relative; z-index: 9999; padding: 20px; display: flex; justify-content: center; gap: 10px; }
        .btn-oval { 
            background-color: #1e3a8a !important; 
            color: white !important; 
            padding: 12px 18px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            touch-action: manipulation; /* Improves mobile response */
        }

        .coin-frame {
            width: 120px; height: 120px; margin: 20px auto;
            border-radius: 50%; overflow: hidden;
            background: white; border: 2px solid #e0f2fe;
            display: flex; align-items: center; justify-content: center;
        }
        .coin-img { width: 100%; height: 100%; object-fit: cover; }
        .dog-card { background: white; border-radius: 30px; padding: 20px; border: 2px solid #e0f2fe; margin-bottom: 20px; }
        .section-hidden { display: none !important; }
    </style>
</head>
<body>

    <nav class="nav-container">
        <button onclick="showSection('public')" class="btn-oval">Home</button>
        <button onclick="handleLogin('client')" class="btn-oval">Clients</button>
        <button onclick="handleLogin('trainer')" class="btn-oval">Trainer</button>
    </nav>

    <main class="max-w-md mx-auto px-6">
        <section id="public-section">
            <div class="coin-frame"><img src="Logo.PNG" class="coin-img"></div>
            <div class="dog-card">
                <h3 class="text-xl font-bold mb-1">Ask the Trainer</h3>
                <p class="text-sm text-slate-500 mb-4">Direct line for expert advice.</p>
                <a href="sms:+18124831632" class="block w-full text-center py-4 bg-slate-900 text-white rounded-2xl font-bold uppercase text-xs">Send Message</a>
            </div>
        </section>

        <section id="portal-section" class="section-hidden">
            <h2 class="text-2xl font-black mb-4 text-center">Current Students</h2>
            <div id="dog-list-container" class="space-y-4"></div>
        </section>

        <section id="admin-section" class="section-hidden">
            <div class="bg-slate-900 text-white p-6 rounded-[35px]">
                <h2 class="text-center font-bold text-blue-400 mb-6 uppercase text-xs">Trainer Control</h2>
                <input id="in-name" type="text" placeholder="Dog's Name" class="w-full p-4 rounded-xl text-black mb-4">
                <div id="admin-commands-list"></div>
                <button onclick="addCommandInput()" class="w-full border border-slate-600 py-3 rounded-xl text-[10px] mb-4">+ ADD COMMAND</button>
                <textarea id="in-notes" class="w-full p-4 rounded-xl text-black h-20 mb-4" placeholder="Notes"></textarea>
                <button id="save-btn" onclick="saveDogData()" class="w-full bg-blue-600 py-4 rounded-xl font-bold">SAVE TO CLOUD</button>
            </div>
        </section>
    </main>

    <script>
        // Use a slight delay to ensure library is loaded
        let supabase;
        window.onload = () => {
            const _URL = "https://yljpxwftoiofpvblcdlx.supabase.co";
            const _KEY = "Sb_publishable_g7HKRXQQRJHAOO1hzp4RKg_7D9xJYnU";
            supabase = window.supabase.createClient(_URL, _KEY);
            console.log("App Initialized");
        };

        function showSection(id) {
            document.getElementById('public-section').classList.add('section-hidden');
            document.getElementById('portal-section').classList.add('section-hidden');
            document.getElementById('admin-section').classList.add('section-hidden');
            document.getElementById(id + '-section').classList.remove('section-hidden');
        }

        async function handleLogin(type) {
            const pass = prompt("Enter Password:");
            if (!pass) return;

            if ((type === 'client' && pass === 'doggy') || (type === 'trainer' && pass === 'trainer123')) {
                // Fetch data
                const { data } = await supabase.from('dogs').select('*').order('created_at', { ascending: false });
                if (type === 'client') {
                    renderClients(data);
                    showSection('portal');
                } else {
                    showSection('admin');
                }
            } else {
                alert("Access Denied");
            }
        }

        function renderClients(data) {
            const container = document.getElementById('dog-list-container');
            container.innerHTML = data.map(dog => `
                <div class="dog-card">
                    <h3 class="text-xl font-bold">${dog.name}</h3>
                    <p class="text-sm text-blue-600 font-bold">REPORT READY</p>
                </div>
            `).join('');
        }
        
        // Simplified Add Command for testing
        function addCommandInput() {
            const div = document.createElement('div');
            div.innerHTML = `<input type="text" class="cmd-name w-full p-2 mb-2 rounded bg-slate-700 text-white" placeholder="Command Name">`;
            document.getElementById('admin-commands-list').appendChild(div);
        }

        async function saveDogData() {
            const name = document.getElementById('in-name').value;
            const notes = document.getElementById('in-notes').value;
            const { error } = await supabase.from('dogs').insert([{ name, notes, commands: [] }]);
            if (error) alert("Error saving"); else location.reload();
        }
    </script>
</body>
</html>
