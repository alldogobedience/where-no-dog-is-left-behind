<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>All Dog Obedience</title><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/react@18/umd/react.development.js"></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script></head><body class="bg-orange-50"><div id="root"></div><script type="text/babel">const {useState}=React;function App(){const [v,sV]=useState('admin');const [c,sC]=useState([{id:1,n:'Place',ch:'Stay until released.'}]);const [nC,snC]=useState({n:'',ch:''});const add=()=>{if(nC.n){sC([...c,{...nC,id:Date.now()}]);snC({n:'',ch:''});}};return(<div class="p-4"><header class="text-center mb-8"><h1 class="text-2xl font-bold text-orange-600">ALL DOG OBEDIENCE</h1><p class="italic text-gray-600">"Where no dog is left behind"</p><div class="flex gap-2 justify-center mt-4"><button onClick={()=>sV('admin')} class="p-2 border rounded">Trainer</button><button onClick={()=>sV('client')} class="p-2 border rounded">Client</button></div></header><main class="max-w-md mx-auto bg-white p-4 rounded-xl shadow-lg">{v==='admin'?(<div class="mb-4"><input class="w-full border p-2 mb-2" placeholder="Skill" value={nC.n} onChange={e=>snC({...nC,n:e.target.value})}/><textarea class="w-full border p-2" placeholder="Details" value={nC.ch} onChange={e=>snC({...nC,ch:e.target.value})}/><button onClick={add} class="w-full bg-orange-500 text-white p-2 mt-2">Save Skill</button></div>):null}<div>{c.map(i=>(<div key={i.id} class="border-b py-2"><h4 class="font-bold">{i.n}</h4><p class="text-sm text-gray-600 italic">{i.ch}</p></div>))}</div></main></div>);}const r=ReactDOM.createRoot(document.getElementById('root'));r.render(<App/>);</script></body></html>
