<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Dog Obedience | Training Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Inter:wght@800;900&display=swap');
        
        body { font-family: 'Quicksand', sans-serif; background-color: #f0f9ff; color: #1e293b; margin: 0; }
        
        @media print {
            nav, .no-print, button, .delete-btn { display: none !important; }
            body { background: white !important; }
            .dog-card { border: none !important; box-shadow: none !important; padding: 0 !important; }
            .print-header { display: block !important; }
        }

        .btn-oval { 
            background-color: #1e3a8a !important; 
            color: #ffffff !important; 
            padding: 12px 24px !important;
            border-radius: 50px !important;
            font-size: 11px !important;
            font-weight: 800 !important;
            text-transform: uppercase !important;
            letter-spacing: 0.1em !important;
            border: none !important;
            box-shadow: 0 4px 10px rgba(30, 58, 138, 0.2) !important;
        }

        .coin-frame {
            width: 220px; height: 220px; margin: 0 auto;
            clip-path: circle(48% at 50% 50%);
            transform: perspective(1000px) rotateX(5deg);
            margin-bottom: 20px;
        }
        .coin-img { width: 100%; height: 100%; object-fit: cover; }

        .dog-card {
            background: white;
            border-radius: 35px;
            padding: 25px;
            border: 3px solid #e0f2fe;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
        }

        .command-row {
            border-bottom: 1px solid #f1f5f9;
            padding: 12px 0;
        }

        .section-hidden { display: none; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="p-6 flex justify-center gap-3 no-print">
        <button onclick="showSection('public')" class="btn-oval">Home</button>
        <button onclick="checkPassword('client')" class="btn-oval">Client Portal</button>
        <button onclick="checkPassword('trainer')" class="btn-oval">Trainer Login</button>
    </nav>

    <main class="max-w-md mx-auto px-6">
        
        <section id="public-section" class="text-center pt-4">
            <div class="coin-frame"><img src="Logo.PNG" class="coin-img"></div>
            <div class="dog-card text-left mb-6">
                <h3 class="text-xl font-bold mb-2">Ask the Trainer</h3>
                <p class="text-sm text-slate-500 mb-6">Direct line for expert advice.</p>
                <a href="sms:+18124831632" class="block w-full text-center py-4 bg-slate-900 text-white rounded-2xl font-bold uppercase tracking-widest text-xs">Send Message</a>
            </div>
            <div class="bg-blue-600 rounded-[35px] p-8 text-white text-left shadow-xl">
                <p id="display-tip" class="text-lg font-semibold italic">"Consistency is the key to a happy dog!"</p>
            </div>
        </section>

        <section id="portal-section" class="section-hidden pt-4 text-center">
            <h2 class="text-3xl font-black mb-6">Current Students</h2>
            <div id="dog-list-container" class="space-y-4"></div>
        </section>

        <section id="dog-detail-section" class="section-hidden pt-4">
            <div class="flex justify-between items-center mb-6 no-print">
                <button onclick="showSection('portal')" class="text-blue-600 font-bold text-sm">← Back</button>
                <button onclick="window.print()" class="bg-slate-100 px-4 py-2 rounded-xl text-xs font-bold uppercase">Print Report</button>
            </div>
            <div id="detail-content"></div>
        </section>

        <section id="admin-section" class="section-hidden pt-4">
            <div class="bg-slate-900 text-white p-8 rounded-[40px] shadow-2xl">
                <h2 class="text-center font-black uppercase text-xs tracking-widest mb-8 text-blue-400">Trainer Control</h2>
                
                <div class="space-y-4">
                    <input id="in-name" type="text" placeholder="Dog's Name" class="w-full p-4 rounded-2xl text-black font-bold outline-none">
                    
                    <div id="admin-commands-list" class="space-y-3">
                        <div class="command-entry flex flex-col gap-2 p-4 bg-slate-800 rounded-2xl">
                            <input type="text" placeholder="Command (e.g. Sit)" class="cmd-name bg-transparent border-b border-slate-700 outline-none text-white font-bold">
                            <input type="text" placeholder="Note (e.g. Needs hand signal)" class="cmd-note bg-transparent outline-none text-slate-400 text-sm">
                        </div>
                    </div>

                    <button onclick="addCommandInput()" class="w-full border-2 border-dashed border-slate-700 py-3 rounded-2xl text-[10px] font-bold uppercase">+ Add Command</button>
                    
                    <textarea id="in-general-notes" class="w-full p-4 rounded-2xl text-black text-sm h-24 outline-none" placeholder="General Progress Notes"></textarea>
                    
                    <button onclick="saveDogData()" class="w-full bg-blue-500 text-white font-black py-5 rounded-2xl text-xs uppercase tracking-widest">Save Dog</button>
                </div>

                <div id="manage-dogs" class="mt-10 pt-6 border-t border-slate-800">
                    <label class="text-[10px] uppercase font-bold opacity-50 block mb-4">Current Kennel</label>
                    <div id="admin-dog-list" class="space-y-2"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const CLIENT_PASS = "doggy";
        const TRAINER_PASS = "trainer123";
        let dogs = JSON.parse(localStorage.getItem('obedienceDogs')) || [];

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('section-hidden'));
            document.getElementById(id + '-section').classList.remove('section-hidden');
            window.scrollTo(0,0);
        }

        function checkPassword(type) {
            const entry = prompt("Enter Password:");
            if (type === 'client' && entry === CLIENT_PASS) { renderDogPortal(); showSection('portal'); }
            else if (type === 'trainer' && entry === TRAINER_PASS) { renderAdminList(); showSection('admin'); }
            else { alert("Wrong password"); }
        }

        function addCommandInput() {
            const div = document.createElement('div');
            div.className = "command-entry flex flex-col gap-2 p-4 bg-slate-800 rounded-2xl relative";
            div.innerHTML = `
                <input type="text" placeholder="Command" class="cmd-name bg-transparent border-b border-slate-700 outline-none text-white font-bold">
                <input type="text" placeholder="Note" class="cmd-note bg-transparent outline-none text-slate-400 text-sm">
                <button onclick="this.parentElement.remove()" class="absolute top-2 right-4 text-red-400 text-xs">✕</button>
            `;
            document.getElementById('admin-commands-list').appendChild(div);
        }

        function saveDogData() {
            const name = document.getElementById('in-name').value;
            const generalNotes = document.getElementById('in-general-notes').value;
            const cmdNames = document.querySelectorAll('.cmd-name');
            const cmdNotes = document.querySelectorAll('.cmd-note');
            
            let commandData = [];
            cmdNames.forEach((input, i) => {
                if(input.value) commandData.push({ name: input.value, note: cmdNotes[i].value });
            });

            if(!name) return alert("Name required");
            dogs.push({ id: Date.now(), name, commands: commandData, notes: generalNotes });
            localStorage.setItem('obedienceDogs', JSON.stringify(dogs));
            location.reload(); 
        }

        function renderDogPortal() {
            const container = document.getElementById('dog-list-container');
            container.innerHTML = dogs.map(dog => `
                <div class="dog-card cursor-pointer" onclick="viewDogDetail(${dog.id})">
                    <h3 class="text-2xl font-black">${dog.name}</h3>
                    <p class="text-xs font-bold text-blue-600 uppercase tracking-widest mt-2">View Report →</p>
                </div>
            `).join('');
        }

        function viewDogDetail(id) {
            const dog = dogs.find(d => d.id === id);
            const content = document.getElementById('detail-content');
            const cmdHtml = dog.commands.map(c => `
                <div class="command-row">
                    <div class="font-bold text-slate-900">${c.name}</div>
                    <div class="text-sm text-slate-500 italic">${c.note}</div>
                </div>
            `).join('');

            content.innerHTML = `
                <div class="dog-card">
                    <div class="text-center mb-6">
                        <img src="Logo.PNG" class="w-20 h-20 mx-auto rounded-full mb-4">
                        <h2 class="text-4xl font-black uppercase">${dog.name}</h2>
                        <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Training Graduation Report</p>
                    </div>
                    <div class="space-y-2 mb-8">${cmdHtml}</div>
                    <div class="bg-blue-50 p-6 rounded-3xl border border-blue-100">
                        <h4 class="text-[10px] font-black uppercase mb-2 text-slate-400">Trainer's Summary</h4>
                        <p class="text-sm text-slate-700 leading-relaxed">${dog.notes}</p>
                    </div>
                </div>
            `;
            showSection('dog-detail');
        }

        function renderAdminList() {
            const container = document.getElementById('admin-dog-list');
            container.innerHTML = dogs.map(dog => `
                <div class="flex justify-between items-center bg-slate-800 p-3 rounded-xl">
                    <span class="font-bold">${dog.name}</span>
                    <button onclick="deleteDog(${dog.id})" class="text-red-400 text-[10px] font-bold uppercase">Delete</button>
                </div>
            `).join('');
        }

        function deleteDog(id) {
            if(confirm("Delete this dog?")) {
                dogs = dogs.filter(d => d.id !== id);
                localStorage.setItem('obedienceDogs', JSON.stringify(dogs));
                renderAdminList();
            }
        }
    </script>
</body>
</html>
