<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>All Dog Obedience</title><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/react@18/umd/react.development.js"></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script></head><body class="bg-orange-50"><div id="root"></div><script type="text/babel">const {useState}=React;function App(){const [v,sV]=useState('public');const [c,sC]=useState([{id:1,n:'Place',ch:'Stay until released. Use the raised cot.'}]);const [nC,snC]=useState({n:'',ch:''});const [q,sQ]=useState('');const add=()=>{if(nC.n){sC([...c,{...nC,id:Date.now()}]);snC({n:'',ch:''});}};const sendSMS=()=>{window.location.href=`sms:+18124831632?body=${encodeURIComponent("Hi All Dog Obedience! I have a question: "+q)}`;};return(<div class="min-h-screen p-4 md:p-8 flex flex-col items-center"><header class="text-center mb-6"><div class="w-20 h-20 bg-white rounded-full shadow-md border-2 border-orange-200 flex items-center justify-center mx-auto mb-2"><span class="text-2xl font-black text-orange-500">ADO</span></div><h1 class="text-3xl font-black text-orange-600 uppercase">All Dog Obedience</h1><p class="italic text-gray-700 font-medium">"Where no dog is left behind"</p><p class="font-bold text-gray-500 text-sm">812-483-1632</p><div class="flex gap-2 justify-center mt-6 bg-white p-1 rounded-full shadow-inner border border-orange-100"><button onClick={()=>sV('public')} class={`px-4 py-1.5 rounded-full text-xs font-bold transition ${v==='public'?'bg-orange-500 text-white shadow-md':'text-gray-500'}`}>Public</button><button onClick={()=>sV('client')} class={`px-4 py-1.5 rounded-full text-xs font-bold transition ${v==='client'?'bg-orange-500 text-white shadow-md':'text-gray-500'}`}>Client</button><button onClick={()=>sV('admin')} class={`px-4 py-1.5 rounded-full text-xs font-bold transition ${v==='admin'?'bg-orange-500 text-white shadow-md':'text-gray-500'}`}>Trainer</button></div></header><main class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-orange-100">{v==='public'?(<div class="p-6"><h2 class="text-xl font-bold mb-2">Have a Question?</h2><p class="text-sm text-gray-500 mb-4">Send me a text and I'll get back to you!</p><textarea class="w-full border-2 border-orange-100 rounded-xl p-3 outline-none focus:border-orange-400" rows="3" placeholder="How can I help you and your dog?" value={q} onChange={e=>sQ(e.target.value)}/><button onClick={sendSMS} class="w-full bg-orange-500 text-white font-black py-3 rounded-xl mt-3 shadow-lg hover:bg-orange-600 uppercase">Text Me My Question</button></div>):null}{v==='admin'?(<div class="p-6 bg-orange-50/50"><h2 class="font-bold text-orange-800 mb-3 uppercase text-sm">Add Client Skills</h2><input class="w-full border p-3 rounded-xl mb-2" placeholder="Command Name" value={nC.n} onChange={e=>snC({...nC,n:e.target.value})}/><textarea class="w-full border p-3 rounded-xl" placeholder="Special Characteristics..." value={nC.ch} onChange={e=>snC({...nC,ch:e.target.value})}/><button onClick={add} class="w-full bg-green-500 text-white font-bold py-3 rounded-xl mt-3 shadow-md uppercase">Save Skill</button></div>):null}{v==='client'||v==='admin'?(<div class="p-6"><div class="flex justify-between items-center mb-4"><h3 class="font-black text-gray-800 uppercase tracking-tight">Active Commands</h3><span class="text-[10px] font-bold bg-orange-100 text-orange-700 px-2 py-1 rounded">Appt: Mon @ 4pm</span></div><div class="space-y-3">{c.map(i=>(<div key={i.id} class="p-4 bg-gray-50 rounded-2xl border-l-4 border-orange-400"><h4 class="font-black text-orange-600 text-sm uppercase">{i.n}</h4><p class="text-xs text-gray-600 italic mt-1 leading-relaxed">{i.ch}</p></div>))}</div></div>):null}</main><footer class="mt-8 text-[10px] text-gray-400 font-bold uppercase tracking-widest">© 2026 All Dog Obedience</footer></div>);}const r=ReactDOM.createRoot(document.getElementById('root'));r.render(<App/>);</script></body></html>
